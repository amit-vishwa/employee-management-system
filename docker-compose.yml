services:
  mysql-ems:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ems_db
    ports:
      - "3307:3306"
    volumes:
      - ems-data:/var/lib/mysql

  mysql-auth:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3308:3306"
    volumes:
      - auth-data:/var/lib/mysql

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-auth
      DB_PASSWORD: root
    depends_on:
      - mysql-auth

  employee-service:
    build:
      context: .
      dockerfile: employee-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql-ems
      DB_PASSWORD: root
      NOTIFICATION_HOST: notification-service
    depends_on:
      - mysql-ems
      - notification-service

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8083:8083"

volumes:
  ems-data:
  auth-data: